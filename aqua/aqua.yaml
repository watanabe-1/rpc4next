# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/aqua-yaml.json

# aqua - Declarative CLI Version Manager

# https://aquaproj.github.io/

checksum:
  enabled: true
  require_checksum: true
  supported_envs:
    - all
registries:
  - type: standard
    ref: v4.526.0 # renovate: depName=aquaproj/aqua-registry

packages:
  - name: nodejs/node@v26.3.1
  - name: oven-sh/bun@bun-v1.3.14
  - name: rhysd/actionlint@v1.7.12
  - name: reviewdog/reviewdog@v0.21.0
  - name: suzuki-shunsuke/ghalint@v1.5.6
  - name: zizmorcore/zizmor@v1.26.1
  - name: suzuki-shunsuke/pinact@v4.1.0
