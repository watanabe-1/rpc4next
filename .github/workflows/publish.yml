name: Publish (npm + provenance)

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      paths_released: ${{ steps.rp.outputs.paths_released }}
    steps:
      - name: Release Please
        id: rp
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          include-component-in-tag: true

  publish:
    needs: release-please
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.paths_released != '[]'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .tool-versions
          registry-url: https://registry.npmjs.org/

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version-file: .tool-versions

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Copy root files
        run: bun scripts/copy-root-files.ts

      - name: Replace workspace deps
        run: bun scripts/replace-workspace-deps.ts

      - name: Build (all packages)
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      # Trusted Publishing requires recent npm (OIDC support).
      - name: Upgrade npm
        run: npm i -g npm@latest

      - name: Publish released packages
        env:
          PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
        shell: bash
        run: |
          set -euo pipefail
          npm config set registry https://registry.npmjs.org/

          node - <<'NODE'
          const { execSync } = require("node:child_process");

          const paths = JSON.parse(process.env.PATHS_RELEASED || "[]");
          for (const p of paths) {
            console.log(`\n==> Publishing ${p}`);
            execSync("npm publish", {
              cwd: p,
              stdio: "inherit",
              env: process.env,
            });
          }
          NODE
