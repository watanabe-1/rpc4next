name: Publish (npm + provenance)

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Create release PR / tags
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # needed by release-please to create tags/releases
      pull-requests: write # needed by release-please to create/update PRs
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      paths_released: ${{ steps.rp.outputs.paths_released }}
    steps:
      - name: Release Please
        id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .github/release-please/release-please-config.json
          manifest-file: .github/release-please/.release-please-manifest.json
          include-component-in-tag: true

  publish:
    name: Publish released packages
    needs: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: needs.release-please.outputs.paths_released != '[]'

    permissions:
      contents: read # needed for checkout
      id-token: write # needed for npm Trusted Publishing (OIDC provenance)

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          node-version: aqua
          bun-version: aqua
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Copy root files
        run: bun scripts/copy-root-files.ts

      - name: Replace workspace deps
        run: bun scripts/replace-workspace-deps.ts .github/release-please/.release-please-manifest.json

      - name: Build (all packages)
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Show npm version
        run: npm --version

      - name: Publish released packages
        env:
          PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
        shell: bash
        run: |
          set -euo pipefail
          npm config set registry https://registry.npmjs.org/

          node - <<'NODE'
          const { execSync } = require("node:child_process");

          const paths = JSON.parse(process.env.PATHS_RELEASED || "[]");
          for (const p of paths) {
            console.log(`\n==> Publishing ${p}`);
            execSync("npm publish", {
              cwd: p,
              stdio: "inherit",
              env: process.env,
            });
          }
          NODE
