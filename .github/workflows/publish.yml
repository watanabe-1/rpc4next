name: Publish (npm + provenance)

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Create release PR / tags
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # needed by release-please to create tags/releases
      pull-requests: write # needed by release-please to create/update PRs
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      paths_released: ${{ steps.rp.outputs.paths_released }}
    steps:
      - name: Release Please
        id: rp
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          config-file: .github/release-please/release-please-config.json
          manifest-file: .github/release-please/.release-please-manifest.json
          include-component-in-tag: true

  publish:
    name: Publish released packages
    needs: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: needs.release-please.outputs.paths_released != '[]'

    permissions:
      contents: read # needed for checkout
      id-token: write # needed for npm Trusted Publishing (OIDC provenance)

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read Node.js/Bun versions from aqua/aqua.yaml
        id: aqua-versions
        shell: bash
        run: |
          set -euo pipefail
          NODE_VERSION="$(sed -nE 's/^- name: nodejs\/node@v?([0-9]+(\.[0-9]+)*)$/\1/p' aqua/aqua.yaml | head -n1)"
          BUN_VERSION="$(sed -nE 's/^- name: oven-sh\/bun@(bun-v|v)?([0-9]+(\.[0-9]+)*)$/\2/p' aqua/aqua.yaml | head -n1)"
          if [ -z "${NODE_VERSION}" ] || [ -z "${BUN_VERSION}" ]; then
            echo "Failed to parse nodejs/node or oven-sh/bun from aqua/aqua.yaml"
            exit 1
          fi
          echo "node-version=${NODE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "bun-version=${BUN_VERSION}" >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ steps.aqua-versions.outputs.node-version }}
          registry-url: https://registry.npmjs.org/

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: ${{ steps.aqua-versions.outputs.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Copy root files
        run: bun scripts/copy-root-files.ts

      - name: Replace workspace deps
        run: bun scripts/replace-workspace-deps.ts .github/release-please/.release-please-manifest.json

      - name: Build (all packages)
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      # Trusted Publishing requires recent npm (OIDC support).
      - name: Upgrade npm
        run: npm i -g npm@latest

      - name: Publish released packages
        env:
          PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
        shell: bash
        run: |
          set -euo pipefail
          npm config set registry https://registry.npmjs.org/

          node - <<'NODE'
          const { execSync } = require("node:child_process");

          const paths = JSON.parse(process.env.PATHS_RELEASED || "[]");
          for (const p of paths) {
            console.log(`\n==> Publishing ${p}`);
            execSync("npm publish", {
              cwd: p,
              stdio: "inherit",
              env: process.env,
            });
          }
          NODE
