name: Bun test

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun-test:
    name: Bun test matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read # needed for actions/checkout
    strategy:
      matrix:
        bun-version: ["1.1.0", "1.2.0", "aqua"]
        next-version: ["14.0.0", "15.0.0", "from-package"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read Bun version from aqua.yaml
        id: aqua-versions
        shell: bash
        run: |
          set -euo pipefail
          BUN_VERSION="$(sed -nE 's/^- name: oven-sh\/bun@(bun-v|v)?([0-9]+(\.[0-9]+)*)$/\2/p' aqua.yaml | head -n1)"
          if [ -z "${BUN_VERSION}" ]; then
            echo "Failed to parse oven-sh/bun from aqua.yaml"
            exit 1
          fi
          echo "bun-version=${BUN_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: ${{ steps.aqua-versions.outputs.bun-version }}

      - name: Install base dependencies
        env:
          BUN_VERSION: ${{ matrix.bun-version }}
        run: |
          if [ "$BUN_VERSION" = "aqua" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Set Next.js version
        env:
          NEXT_VERSION: ${{ matrix.next-version }}
        run: |
          case "$NEXT_VERSION" in
            14.0.0|15.0.0|from-package) ;;
            *)
              echo "Invalid NEXT_VERSION: $NEXT_VERSION"
              exit 1
              ;;
          esac

          if [ "$NEXT_VERSION" = "from-package" ]; then
            echo "Using next from package.json"
          else
            echo "Overwriting package.json to use next@$NEXT_VERSION"
            rm -f bun.lockb bun.lock
            bun add "next@$NEXT_VERSION"
          fi

      - name: Print versions
        run: |
          bun -v
          bunx next --version

      - name: Build (all packages)
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      # --- Restore Bun back to matrix for the rest ---
      - name: Restore Bun (from matrix)
        if: matrix.bun-version != 'aqua'
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install deps for Test (matrix Bun)
        env:
          BUN_VERSION: ${{ matrix.bun-version }}
        run: |
          if [ "$BUN_VERSION" = "aqua" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Print versions
        run: |
          bun -v
          bunx next --version

      - name: Test
        run: bun run test

  status-check:
    name: Bun test status check
    runs-on: ubuntu-latest
    if: always()
    needs:
      - bun-test
    steps:
      - name: Check required job result
        env:
          BUN_TEST_RESULT: ${{ needs.bun-test.result }}
        run: |
          if [ "$BUN_TEST_RESULT" = "success" ]; then
            exit 0
          fi
          echo "bun-test result: $BUN_TEST_RESULT"
          exit 1
