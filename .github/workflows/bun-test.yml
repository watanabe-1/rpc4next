name: Bun test

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun-test:
    name: Bun test matrix (${{ matrix.os }}, bun=${{ matrix.bun-version }}, next=${{ matrix.next-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read # needed for actions/checkout
    strategy:
      matrix:
        os: [ubuntu-latest]
        bun-version: ["1.1.0", "1.2.0", "aqua"]
        next-version: ["15.0.0", "from-package"]
        include:
          - os: windows-latest
            bun-version: aqua
            next-version: from-package

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup toolchain (from aqua/aqua.yaml)
        uses: ./.github/actions/setup-toolchain
        with:
          bun-version: aqua
          bun-cache: "true"

      - name: Install base dependencies
        shell: bash
        env:
          BUN_VERSION: ${{ matrix.bun-version }}
        run: |
          if [ "$BUN_VERSION" = "aqua" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Set Next.js version
        shell: bash
        env:
          NEXT_VERSION: ${{ matrix.next-version }}
        run: |
          if [ "$NEXT_VERSION" = "from-package" ]; then
            echo "Using next from package.json"
          else
            echo "Overwriting package.json to use next@$NEXT_VERSION"
            rm -f bun.lockb bun.lock
            bun add "next@$NEXT_VERSION"
          fi

      - name: Print versions
        shell: bash
        run: |
          uname -a || ver
          bun -v
          bunx next --version

      - name: Build (all packages)
        shell: bash
        run: bun run build

      - name: Typecheck
        shell: bash
        run: bun run typecheck

      - name: Lint
        shell: bash
        run: bun run lint

      # --- Restore Bun back to matrix for the rest ---
      - name: Restore Bun (from matrix)
        if: matrix.bun-version != 'aqua'
        uses: ./.github/actions/setup-toolchain
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install deps for Test (matrix Bun)
        shell: bash
        env:
          BUN_VERSION: ${{ matrix.bun-version }}
        run: |
          if [ "$BUN_VERSION" = "aqua" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Print versions
        shell: bash
        run: |
          uname -a || ver
          bun -v
          bunx next --version

      - name: Test
        shell: bash
        run: bun run test

  status-check:
    name: Bun test status check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    needs:
      - bun-test
    steps:
      - name: Check required job result
        env:
          BUN_TEST_RESULT: ${{ needs.bun-test.result }}
        run: |
          if [ "$BUN_TEST_RESULT" = "success" ]; then
            exit 0
          fi
          echo "bun-test result: $BUN_TEST_RESULT"
          exit 1
