name: Bun test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bun-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        bun-version: ["1.1.0", "1.2.0", "tool-versions"]
        next-version: ["14.0.0", "15.0.0", "from-package"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version-file: .tool-versions

      - name: Install base dependencies
        run: |
          if [ "${{ matrix.bun-version }}" = "tool-versions" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Set Next.js version
        run: |
          if [ "${{ matrix.next-version }}" = "from-package" ]; then
            echo "Using next from package.json"
          else
            echo "Overwriting package.json to use next@${{ matrix.next-version }}"
            rm -f bun.lockb bun.lock
            bun add "next@${{ matrix.next-version }}"
          fi

      - name: Print versions
        run: |
          bun -v
          bunx next --version

      - name: Build (all packages)
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      # --- Restore Bun back to matrix for the rest ---
      - name: Restore Bun (from matrix)
        if: matrix.bun-version != 'tool-versions'
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install deps for Test (matrix Bun)
        run: |
          if [ "${{ matrix.bun-version }}" = "tool-versions" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Print versions
        run: |
          bun -v
          bunx next --version

      - name: Test
        run: bun run test
