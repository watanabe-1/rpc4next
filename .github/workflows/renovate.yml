name: Renovate

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  renovate:
    # workflow_dispatch allows selecting any branch, so restrict to main
    if: github.ref == 'refs/heads/main'
    name: renovate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: renovate
    permissions:
      contents: read
    steps:
      - name: Create github app token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: renovate-app-token
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}
          permission-administration: read
          permission-checks: write
          permission-statuses: write
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-workflows: write
          permission-members: read
          permission-vulnerability-alerts: read

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Renovate
        uses: renovatebot/github-action@a3c115cd6676c8a5bc72f9715f108759e570daf5 # v43.0.19
        env:
          LOG_LEVEL: info
          RENOVATE_REPOSITORIES: ${{ github.repository }}
        with:
          token: ${{ steps.renovate-app-token.outputs.token }}
          configurationFile: .github/renovate.json
