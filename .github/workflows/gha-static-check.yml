name: GHA static checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write # Required to publish actionlint results as GitHub Checks annotations.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@0d952c597ef8459f634d7145b0b044a9699e5e43 # v1.71.0
        with:
          fail_level: any

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read # Required so zizmor can read workflow/action metadata during analysis.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor (no Advanced Security)
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0
        with:
          advanced-security: false
          annotations: true

  ghalint:
    name: ghalint
    runs-on: ubuntu-latest
    env:
      AQUA_GLOBAL_CONFIG: ${{ github.workspace }}/aqua.yaml
    permissions:
      contents: read
      checks: write # Required to publish reviewdog results as GitHub Checks on push events.
      pull-requests: write # Required to publish reviewdog results as PR review comments.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup aqua
        uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.56.7
        env:
          AQUA_GITHUB_TOKEN: ${{ github.token }}

      - name: Install required tools lazily
        shell: bash
        run: |
          ghalint -v
          reviewdog -version

      - name: Run ghalint with reviewdog
        shell: bash
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
          GHALINT_LOG_COLOR: always
        run: |
          reporter=github-check
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            reporter=github-pr-review
          fi

          if ( reviewdog --help 2>&1 || : ) | grep -- "-fail-level" >/dev/null; then
            options="-fail-level=error"
          else
            options="-fail-on-error=1"
          fi

          output_file="$(mktemp)"
          rdinput_file="$(mktemp)"
          set +e
          ghalint run 2>&1 | tee "$output_file"
          ghalint_status=${PIPESTATUS[0]}
          set -e

          while IFS= read -r logline; do
            clean_line="$(printf '%s\n' "$logline" | sed -E 's/\x1B\[[0-9;]*[mK]//g')"

            case "$clean_line" in
              *"workflow_file_path="*) ;;
              *) continue ;;
            esac

            path="$(printf '%s\n' "$clean_line" | sed -n 's/.*workflow_file_path=\([^ ]*\).*/\1/p')"
            [ -n "$path" ] || continue

            msg="$(printf '%s\n' "$clean_line" | sed -E 's/^[A-Z]+\[[0-9]+\][[:space:]]+//; s/[[:space:]]+[a-zA-Z0-9_]+=([^[:space:]]+)//g; s/[[:space:]]+$//')"
            if [ -z "$msg" ]; then
              msg="ghalint violation"
            fi

            line_no=1
            job_name="$(printf '%s\n' "$clean_line" | sed -n 's/.* job_name=\([^ ]*\).*/\1/p')"
            if [ -n "$job_name" ] && [ -f "$path" ]; then
              detected_line="$(grep -nF "  ${job_name}:" "$path" | head -n1 | cut -d: -f1)"
              if [ -n "$detected_line" ]; then
                line_no="$detected_line"
              fi
            fi

            printf '%s:%s:1: %s\n' "$path" "$line_no" "$msg" >> "$rdinput_file"
          done < "$output_file"

          cat "$rdinput_file" |
            reviewdog \
              -efm="%f:%l:%c: %m" \
              -name="ghalint" \
              -filter-mode=nofilter \
              -reporter="$reporter" \
              -level=warning \
              "$options"

          exit "$ghalint_status"

  status-check:
    name: GHA static checks status check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    needs:
      - actionlint
      - zizmor
      - ghalint
    steps:
      - name: Check required job results
        env:
          ACTIONLINT_RESULT: ${{ needs.actionlint.result }}
          ZIZMOR_RESULT: ${{ needs.zizmor.result }}
          GHALINT_RESULT: ${{ needs.ghalint.result }}
        run: |
          if [ "$ACTIONLINT_RESULT" = "success" ] && [ "$ZIZMOR_RESULT" = "success" ] && [ "$GHALINT_RESULT" = "success" ]; then
            exit 0
          fi
          echo "actionlint result: $ACTIONLINT_RESULT"
          echo "zizmor result: $ZIZMOR_RESULT"
          echo "ghalint result: $GHALINT_RESULT"
          exit 1
