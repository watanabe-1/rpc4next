name: Node test

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-test:
    name: Node test matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read # needed for actions/checkout
      pull-requests: write # needed for coverage comment on pull_request events
    strategy:
      matrix:
        node-version: [20.9.0, 22, tool-versions]
        next-version: ["14.0.0", "15.0.0", "from-package"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js (from matrix)
        if: matrix.node-version != 'tool-versions'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Node.js (from .tool-versions)
        if: matrix.node-version == 'tool-versions'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .tool-versions

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version-file: .tool-versions

      - name: Install base dependencies
        run: bun install --frozen-lockfile

      - name: Install target Next.js version
        env:
          NEXT_VERSION: ${{ matrix.next-version }}
        run: |
          case "$NEXT_VERSION" in
            14.0.0|15.0.0|from-package) ;;
            *)
              echo "Invalid NEXT_VERSION: $NEXT_VERSION"
              exit 1
              ;;
          esac

          if [ "$NEXT_VERSION" = "from-package" ]; then
            echo "Using next from package.json"
          else
            echo "Overwriting package.json to use next@$NEXT_VERSION"
            rm -f bun.lockb bun.lock
            bun add "next@$NEXT_VERSION"
          fi

      - name: Print versions
        run: |
          node -v
          bun next --version

      - name: Build (all packages)
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        env:
          NODE_VERSION: ${{ matrix.node-version }}
          NEXT_VERSION: ${{ matrix.next-version }}
        run: |
          case "$NODE_VERSION" in
            20.9.0|22|tool-versions) ;;
            *)
              echo "Invalid NODE_VERSION: $NODE_VERSION"
              exit 1
              ;;
          esac
          case "$NEXT_VERSION" in
            14.0.0|15.0.0|from-package) ;;
            *)
              echo "Invalid NEXT_VERSION: $NEXT_VERSION"
              exit 1
              ;;
          esac

          if [ "$NODE_VERSION" = "tool-versions" ] && [ "$NEXT_VERSION" = "from-package" ]; then
            npm run test:coverage
          else
            npm run test
          fi

      - name: Report Coverage
        if: ${{ matrix.node-version == 'tool-versions' && matrix.next-version == 'from-package' }}
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2.9.3
        with:
          comment-on: ${{ github.event_name == 'pull_request' && 'pr' || 'commit' }}

  status-check:
    name: Node test status check
    runs-on: ubuntu-latest
    if: always()
    needs:
      - node-test
    steps:
      - name: Check required job result
        env:
          NODE_TEST_RESULT: ${{ needs.node-test.result }}
        run: |
          if [ "$NODE_TEST_RESULT" = "success" ]; then
            exit 0
          fi
          echo "node-test result: $NODE_TEST_RESULT"
          exit 1
