name: Node test

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-test:
    name: Node test matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read # needed for actions/checkout
      pull-requests: write # needed for coverage comment on pull_request events
    strategy:
      matrix:
        node-version: [20.9.0, 22, aqua]
        next-version: ["14.0.0", "15.0.0", "from-package"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read Node.js/Bun versions from aqua.yaml
        id: aqua-versions
        shell: bash
        run: |
          set -euo pipefail
          NODE_VERSION="$(sed -nE 's/^- name: nodejs\/node@v?([0-9]+(\.[0-9]+)*)$/\1/p' aqua.yaml | head -n1)"
          BUN_VERSION="$(sed -nE 's/^- name: oven-sh\/bun@(bun-v|v)?([0-9]+(\.[0-9]+)*)$/\2/p' aqua.yaml | head -n1)"
          if [ -z "${NODE_VERSION}" ] || [ -z "${BUN_VERSION}" ]; then
            echo "Failed to parse nodejs/node or oven-sh/bun from aqua.yaml"
            exit 1
          fi
          echo "node-version=${NODE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "bun-version=${BUN_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Setup Node.js (from matrix)
        if: matrix.node-version != 'aqua'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Node.js (from aqua.yaml)
        if: matrix.node-version == 'aqua'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ steps.aqua-versions.outputs.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: ${{ steps.aqua-versions.outputs.bun-version }}

      - name: Install base dependencies
        run: bun install --frozen-lockfile

      - name: Install target Next.js version
        env:
          NEXT_VERSION: ${{ matrix.next-version }}
        run: |
          if [ "$NEXT_VERSION" = "from-package" ]; then
            echo "Using next from package.json"
          else
            echo "Overwriting package.json to use next@$NEXT_VERSION"
            rm -f bun.lockb bun.lock
            bun add "next@$NEXT_VERSION"
          fi

      - name: Print versions
        run: |
          node -v
          bun next --version

      - name: Build (all packages)
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        env:
          NODE_VERSION: ${{ matrix.node-version }}
          NEXT_VERSION: ${{ matrix.next-version }}
        run: |
          if [ "$NODE_VERSION" = "aqua" ] && [ "$NEXT_VERSION" = "from-package" ]; then
            npm run test:coverage
          else
            npm run test
          fi

      - name: Report Coverage
        if: ${{ matrix.node-version == 'aqua' && matrix.next-version == 'from-package' }}
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2.9.3
        with:
          comment-on: ${{ github.event_name == 'pull_request' && 'pr' || 'commit' }}

  status-check:
    name: Node test status check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    needs:
      - node-test
    steps:
      - name: Check required job result
        env:
          NODE_TEST_RESULT: ${{ needs.node-test.result }}
        run: |
          if [ "$NODE_TEST_RESULT" = "success" ]; then
            exit 0
          fi
          echo "node-test result: $NODE_TEST_RESULT"
          exit 1
