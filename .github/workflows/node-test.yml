name: Node test

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-test:
    name: Node test matrix (${{ matrix.os }}, node=${{ matrix.node-version }}, next=${{ matrix.next-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read # needed for actions/checkout
      pull-requests: write # needed for coverage comment on pull_request events
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [20.19.2, 22, 24, aqua]
        next-version: ["15.0.0", "from-package"]
        include:
          - os: windows-latest
            node-version: aqua
            next-version: from-package

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read Node.js/Bun versions from aqua/aqua.yaml
        id: aqua-versions
        shell: bash
        run: |
          set -euo pipefail
          NODE_VERSION="$(sed -nE 's/^- name: nodejs\/node@v?([0-9]+(\.[0-9]+)*)$/\1/p' aqua/aqua.yaml | head -n1)"
          BUN_VERSION="$(sed -nE 's/^- name: oven-sh\/bun@(bun-v|v)?([0-9]+(\.[0-9]+)*)$/\2/p' aqua/aqua.yaml | head -n1)"
          if [ -z "${NODE_VERSION}" ] || [ -z "${BUN_VERSION}" ]; then
            echo "Failed to parse nodejs/node or oven-sh/bun from aqua/aqua.yaml"
            exit 1
          fi
          echo "node-version=${NODE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "bun-version=${BUN_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Setup Node.js (from matrix)
        if: matrix.node-version != 'aqua'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Node.js (from aqua/aqua.yaml)
        if: matrix.node-version == 'aqua'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ steps.aqua-versions.outputs.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: ${{ steps.aqua-versions.outputs.bun-version }}

      # Follow the GitHub Actions Bun cache example:
      # https://github.com/actions/cache/blob/main/examples.md#bun
      # Linux/macOS cache ~/.bun/install/cache.
      - name: Restore Bun package cache (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      # Cache Bun package downloads.
      # Note:
      # https://github.com/actions/cache/blob/main/examples.md#bun
      # The actions/cache examples use `~/.bun/install/cache` for Bun in general,
      # but the Windows section shows `~\.bun`. When tracing the history of the
      # example (PR #1456),
      # https://github.com/actions/cache/pull/1456
      # the Windows snippet originally contained a copy-paste
      # mistake from the Deno example and was later corrected, but there is no
      # documented rationale for caching the entire `~\.bun` directory.
      # According to Bun's documentation, downloaded package tarballs used by
      # https://bun.sh/docs/pm/global-cache
      # `bun install` are stored in `~/.bun/install/cache`. Since our goal here is
      # to speed up dependency installation in CI (and to keep cache archives
      # smaller for faster restore on Windows runners), we cache only the
      # package cache directory instead of the entire Bun home.
      # If CI later relies on global installs (`bun install -g`) or other files
      # under `~/.bun`, this may need to be expanded back to `~\.bun`.
      - name: Restore Bun package cache (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install base dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Install target Next.js version
        shell: bash
        env:
          NEXT_VERSION: ${{ matrix.next-version }}
        run: |
          if [ "$NEXT_VERSION" = "from-package" ]; then
            echo "Using next from package.json"
          else
            echo "Overwriting package.json to use next@$NEXT_VERSION"
            rm -f bun.lockb bun.lock
            bun add "next@$NEXT_VERSION"
          fi

      - name: Print versions
        shell: bash
        run: |
          uname -a || ver
          node -v
          bun next --version

      - name: Build (all packages)
        shell: bash
        run: bun run build

      - name: Typecheck
        shell: bash
        run: bun run typecheck

      - name: Lint
        shell: bash
        run: bun run lint

      - name: Test
        shell: bash
        env:
          MATRIX_OS: ${{ matrix.os }}
          NODE_VERSION: ${{ matrix.node-version }}
          NEXT_VERSION: ${{ matrix.next-version }}
        run: |
          if [ "$MATRIX_OS" = "ubuntu-latest" ] && [ "$NODE_VERSION" = "aqua" ] && [ "$NEXT_VERSION" = "from-package" ]; then
            npm run test:coverage
          else
            npm run test
          fi

      - name: Report Coverage
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.node-version == 'aqua' && matrix.next-version == 'from-package' }}
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2.9.3
        with:
          comment-on: ${{ github.event_name == 'pull_request' && 'pr' || 'commit' }}

  status-check:
    name: Node test status check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    needs:
      - node-test
    steps:
      - name: Check required job result
        env:
          NODE_TEST_RESULT: ${{ needs.node-test.result }}
        run: |
          if [ "$NODE_TEST_RESULT" = "success" ]; then
            exit 0
          fi
          echo "node-test result: $NODE_TEST_RESULT"
          exit 1
