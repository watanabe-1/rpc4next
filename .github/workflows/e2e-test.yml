name: E2E test

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-test:
    name: E2E test matrix (${{ matrix.os }}, node=${{ matrix.node-version }}, next=${{ matrix.next-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read # needed for actions/checkout
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [aqua]
        next-version: ["15.0.0", "from-package"]
        include:
          - os: windows-latest
            node-version: aqua
            next-version: from-package

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          node-version: ${{ matrix.node-version }}
          bun-version: aqua
          bun-cache: "true"

      - name: Install base dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Install target Next.js version
        shell: bash
        env:
          NEXT_VERSION: ${{ matrix.next-version }}
        run: |
          if [ "$NEXT_VERSION" = "from-package" ]; then
            echo "Using next from package.json"
          else
            echo "Overwriting package.json to use next@$NEXT_VERSION"
            rm -f bun.lockb bun.lock
            bun add "next@$NEXT_VERSION"
          fi

      - name: Install Playwright browser dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright browser (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: bunx playwright install chromium

      - name: Print versions
        shell: bash
        run: |
          uname -a || ver
          node -v
          bun -v
          bunx next --version

      - name: Build (all packages)
        shell: bash
        run: bun run build

      - name: Run integration e2e
        shell: bash
        run: bun run integration:next-app:e2e

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.os }}-node-${{ matrix.node-version }}-next-${{ matrix.next-version }}
          path: integration/next-app/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  status-check:
    name: E2E test status check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    needs:
      - e2e-test
    steps:
      - name: Check required job result
        env:
          E2E_TEST_RESULT: ${{ needs.e2e-test.result }}
        run: |
          if [ "$E2E_TEST_RESULT" = "success" ]; then
            exit 0
          fi
          echo "e2e-test result: $E2E_TEST_RESULT"
          exit 1
