name: Update aqua-checksums

on:
  pull_request:
    paths:
      - aqua.yaml
      - aqua-checksums.json

permissions:
  contents: write

jobs:
  update-aqua-checksums:
    uses: aquaproj/update-checksum-workflow/.github/workflows/update-checksum.yaml@d248abb88efce715d50eb324100d9b29a20f7d18
    with:
      aqua_version: v2.56.7
      prune: true
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
